<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Мой магазин - Заказ товаров</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
        }
        
        .search-bar {
            margin-bottom: 30px;
        }
        
        .search-input {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            display: block;
            padding: 15px 20px;
            font-size: 16px;
            border: none;
            border-radius: 50px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            outline: none;
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }
        
        .product-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        
        .product-image {
            height: 160px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }
        
        .product-info {
            padding: 20px;
        }
        
        .product-name {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        
        .product-code {
            font-size: 12px;
            color: #999;
            margin-bottom: 10px;
        }
        
        .product-price {
            font-size: 24px;
            font-weight: bold;
            color: #FF9800;
            margin: 10px 0;
        }
        
        .product-stock {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .in-stock {
            background: #4CAF50;
            color: white;
        }
        
        .low-stock {
            background: #FF9800;
            color: white;
        }
        
        .out-of-stock {
            background: #f44336;
            color: white;
        }
        
        .order-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        
        .order-btn:hover {
            opacity: 0.9;
        }
        
        .order-btn.disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        /* Модальное окно для заказа */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }
        
        .modal-content h3 {
            margin-bottom: 20px;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: 500;
        }
        
        .form-group input, 
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus, 
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-group input:invalid {
            border-color: #ff4444;
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .btn-secondary {
            background: #999;
            margin-top: 10px;
        }
        
        .footer {
            text-align: center;
            color: white;
            padding: 20px;
            font-size: 14px;
            opacity: 0.8;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            z-index: 2000;
            animation: fadeInUp 0.3s ease;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: white;
            font-size: 18px;
        }
        
        .empty {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 20px;
            color: #999;
        }
        
        .contact-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-top: 30px;
            text-align: center;
        }
        
        .contact-email {
            font-size: 20px;
            color: #667eea;
            margin: 10px 0;
        }
        
        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: 1fr;
            }
            
            .product-image {
                height: 120px;
                font-size: 40px;
            }
        }
        
        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 Мой магазин</h1>
            <p>Выберите товар и оформите заказ</p>
        </div>
        
        <div class="search-bar">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Поиск товаров...">
        </div>
        
        <div id="productsGrid" class="products-grid">
            <div class="loading">⏳ Загрузка товаров...</div>
        </div>
        
        <div class="contact-card">
            <h3>📧 Не нашли нужный товар?</h3>
            <p>Напишите нам на почту, и мы поможем!</p>
            <div class="contact-email">
                📧 <a href="mailto:zakaz@yourstore.com">zakaz@yourstore.com</a>
            </div>
            <p style="margin-top: 15px; font-size: 12px; color: #999;">
                Или заполните форму заказа ниже
            </p>
        </div>
    </div>
    
    <!-- Модальное окно заказа -->
    <div id="orderModal" class="modal">
        <div class="modal-content">
            <h3>📝 Оформление заказа</h3>
            <div id="selectedProductInfo" style="background:#f0f0f0; padding:15px; border-radius:10px; margin-bottom:20px;"></div>
            
            <form id="orderForm" method="POST" action="https://formspree.io/f/ВАШ_КЛЮЧ_ФОРМЫ">
                <div class="form-group">
                    <label>Ваше имя *</label>
                    <input type="text" name="name" id="orderName" required>
                </div>
                
                <div class="form-group">
                    <label>Email * (для подтверждения)</label>
                    <input type="email" name="email" id="orderEmail" required>
                </div>
                
                <div class="form-group">
                    <label>Телефон *</label>
                    <input type="tel" name="phone" id="orderPhone" required>
                </div>
                
                <div class="form-group">
                    <label>Количество *</label>
                    <input type="number" name="quantity" id="orderQty" min="1" value="1" required>
                </div>
                
                <div class="form-group">
                    <label>Адрес доставки</label>
                    <textarea name="address" id="orderAddress" rows="2" placeholder="Город, улица, дом"></textarea>
                </div>
                
                <div class="form-group">
                    <label>Комментарий к заказу</label>
                    <textarea name="comment" id="orderComment" rows="2" placeholder="Ваши пожелания"></textarea>
                </div>
                
                <!-- Скрытые поля -->
                <input type="hidden" name="product" id="orderProduct" value="">
                <input type="hidden" name="_subject" id="orderSubject" value="Новый заказ с сайта">
                <input type="hidden" name="_replyto" id="orderReplyto">
                
                <!-- Защита от спама -->
                <input type="text" name="_gotcha" style="display:none">
                
                <button type="submit" class="btn">📦 Отправить заказ</button>
                <button type="button" class="btn btn-secondary" onclick="closeModal()">Отмена</button>
            </form>
        </div>
    </div>
    
    <div class="footer">
        <p>📧 По всем вопросам: <a href="mailto:zakaz@yourstore.com" style="color:white;">zakaz@yourstore.com</a></p>
        <p>© 2024 Магазин. Все права защищены.</p>
    </div>
    
    <script>
        // Данные о товарах (можно редактировать прямо здесь)
        const PRODUCTS_DATA = {
            "products": [
                {
                    "id": 1,
                    "code": "4601234567890",
                    "name": "Смартфон Galaxy S21",
                    "price": 29990,
                    "quantity": 15,
                    "min_quantity": 3,
                    "unit": "шт",
                    "inStock": true
                },
                {
                    "id": 2,
                    "code": "4601234567891",
                    "name": "Наушники Bluetooth",
                    "price": 2990,
                    "quantity": 30,
                    "min_quantity": 5,
                    "unit": "шт",
                    "inStock": true
                },
                {
                    "id": 3,
                    "code": "4601234567892",
                    "name": "Зарядное устройство",
                    "price": 990,
                    "quantity": 50,
                    "min_quantity": 10,
                    "unit": "шт",
                    "inStock": true
                },
                {
                    "id": 4,
                    "code": "4601234567893",
                    "name": "Чехол для телефона",
                    "price": 590,
                    "quantity": 25,
                    "min_quantity": 5,
                    "unit": "шт",
                    "inStock": true
                },
                {
                    "id": 5,
                    "code": "4601234567894",
                    "name": "Защитное стекло",
                    "price": 390,
                    "quantity": 0,
                    "min_quantity": 10,
                    "unit": "шт",
                    "inStock": false
                },
                {
                    "id": 6,
                    "code": "4601234567895",
                    "name": "Портативная колонка",
                    "price": 4990,
                    "quantity": 2,
                    "min_quantity": 3,
                    "unit": "шт",
                    "inStock": true
                }
            ]
        };
        
        let currentProduct = null;
        
        // Функция для загрузки товаров
        function loadProducts(searchTerm = '') {
            const grid = document.getElementById('productsGrid');
            
            // Имитация загрузки
            grid.innerHTML = '<div class="loading">⏳ Загрузка товаров...</div>';
            
            setTimeout(() => {
                let products = PRODUCTS_DATA.products;
                
                // Фильтрация по поиску
                if (searchTerm) {
                    const search = searchTerm.toLowerCase();
                    products = products.filter(p => 
                        p.name.toLowerCase().includes(search) || 
                        p.code.includes(search)
                    );
                }
                
                if (products.length === 0) {
                    grid.innerHTML = '<div class="empty">📭 Товары не найдены</div>';
                    return;
                }
                
                grid.innerHTML = products.map(product => {
                    let stockStatus = '';
                    let stockClass = '';
                    let stockText = '';
                    
                    if (product.quantity <= 0) {
                        stockClass = 'out-of-stock';
                        stockText = '❌ Нет в наличии';
                        stockStatus = 'disabled';
                    } else if (product.quantity <= product.min_quantity) {
                        stockClass = 'low-stock';
                        stockText = `⚠️ Осталось ${product.quantity} шт.`;
                        stockStatus = '';
                    } else {
                        stockClass = 'in-stock';
                        stockText = `✅ В наличии (${product.quantity} шт.)`;
                        stockStatus = '';
                    }
                    
                    return `
                        <div class="product-card">
                            <div class="product-image">
                                ${getProductIcon(product.name)}
                            </div>
                            <div class="product-info">
                                <div class="product-name">${escapeHtml(product.name)}</div>
                                <div class="product-code">Штрихкод: ${product.code}</div>
                                <div class="product-price">${product.price.toLocaleString()} ₽ / ${product.unit}</div>
                                <div class="product-stock ${stockClass}">${stockText}</div>
                                <button class="order-btn ${product.quantity <= 0 ? 'disabled' : ''}" 
                                        onclick="openOrderModal(${product.id})"
                                        ${product.quantity <= 0 ? 'disabled' : ''}>
                                    ${product.quantity > 0 ? '🛒 Заказать' : '📝 Уведомить'}
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');
            }, 300);
        }
        
        function getProductIcon(name) {
            const icons = {
                'Смартфон': '📱',
                'Наушники': '🎧',
                'Зарядное': '🔋',
                'Чехол': '📱',
                'Стекло': '🔍',
                'Колонка': '🔊'
            };
            
            for (const [key, icon] of Object.entries(icons)) {
                if (name.includes(key)) return icon;
            }
            return '📦';
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function openOrderModal(productId) {
            const product = PRODUCTS_DATA.products.find(p => p.id === productId);
            if (!product) return;
            
            if (product.quantity <= 0) {
                // Если товара нет, предложим уведомление
                const userEmail = prompt('Товара временно нет в наличии.\nОставьте email, и мы уведомим вас о поступлении:\n\nEmail:');
                if (userEmail && userEmail.includes('@')) {
                    showToast(`✉️ Спасибо! Уведомим на ${userEmail} о поступлении.`);
                    
                    // Здесь можно отправить на почту через Formspree
                    fetch('https://formspree.io/f/ВАШ_КЛЮЧ_ФОРМЫ', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            name: 'Уведомление',
                            email: userEmail,
                            product: product.name,
                            message: 'Хочу получить уведомление о поступлении товара'
                        })
                    }).catch(console.error);
                }
                return;
            }
            
            currentProduct = product;
            
            // Заполняем информацию о товаре
            const infoDiv = document.getElementById('selectedProductInfo');
            infoDiv.innerHTML = `
                <strong>${escapeHtml(product.name)}</strong><br>
                Цена: ${product.price.toLocaleString()} ₽ / ${product.unit}<br>
                Доступно: ${product.quantity} шт.<br>
                Код: ${product.code}
            `;
            
            // Заполняем форму
            document.getElementById('orderProduct').value = `${product.name} (${product.code})`;
            document.getElementById('orderSubject').value = `Заказ: ${product.name}`;
            document.getElementById('orderQty').value = 1;
            document.getElementById('orderQty').max = product.quantity;
            
            // Подставляем email из localStorage если есть
            const savedEmail = localStorage.getItem('userEmail');
            if (savedEmail) {
                document.getElementById('orderEmail').value = savedEmail;
            }
            
            document.getElementById('orderModal').style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('orderModal').style.display = 'none';
            document.getElementById('orderForm').reset();
        }
        
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // Сохраняем email при отправке формы
        document.getElementById('orderForm').addEventListener('submit', function(e) {
            const email = document.getElementById('orderEmail').value;
            if (email) {
                localStorage.setItem('userEmail', email);
            }
            
            showToast('✉️ Заказ отправлен! Мы свяжемся с вами в ближайшее время.');
            
            // Даём время на отправку формы
            setTimeout(() => {
                closeModal();
            }, 1000);
        });
        
        // Поиск с задержкой
        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                loadProducts(e.target.value);
            }, 400);
        });
        
        // Закрытие модального окна по клику вне его
        window.onclick = (event) => {
            if (event.target === document.getElementById('orderModal')) {
                closeModal();
            }
        };
        
        // Загрузка товаров при старте
        loadProducts();
        
        console.log('Сайт загружен! 📦');
    </script>
</body>
</html>
