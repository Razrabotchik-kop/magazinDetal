        .search-input {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            display: block;
            padding: 15px 20px;
            font-size: 16px;
            border: none;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .categories-nav {
            background: white;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 30px;
            overflow-x: auto;
            white-space: nowrap;
        }
        
        .category-btn {
            display: inline-block;
            padding: 10px 20px;
            margin: 0 5px;
            background: #f0f0f0;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .category-btn:hover, .category-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            transform: translateY(-2px);
        }
        
        .subcategories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .subcategory-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .subcategory-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }
        
        .subcategory-icon { font-size: 48px; margin-bottom: 10px; }
        .subcategory-name { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .subcategory-count { color: #666; font-size: 13px; }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }
        
        .product-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s;
            position: relative;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0,0,0,0.2); }
        
        .product-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            background: #FF6B6B;
            color: white;
        }
        
        .product-image {
            height: 160px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 55px;
        }
        
        .product-info { padding: 20px; }
        .product-name { font-size: 16px; font-weight: bold; color: #333; margin-bottom: 5px; }
        .product-code { font-size: 10px; color: #aaa; margin-bottom: 10px; }
        .product-price { font-size: 22px; font-weight: bold; color: #FF6B6B; margin: 10px 0; }
        
        .product-stock {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 15px;
        }
        
        .stock-high { background: #d4edda; color: #155724; }
        .stock-low { background: #fff3cd; color: #856404; }
        .stock-out { background: #f8d7da; color: #721c24; }
        
        .order-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .order-btn:hover:not(:disabled) { transform: scale(1.02); }
        .order-btn:disabled { background: #ccc; cursor: not-allowed; }
        
        .back-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        
        .contact-card {
            background: rgba(255,255,255,0.95);
            border-radius: 25px;
            padding: 30px;
            text-align: center;
            margin-top: 30px;
        }
        
        .contact-email { font-size: 20px; margin: 15px 0; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 25px;
            max-width: 500px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
        }
        
        .btn-submit {
            width: 100%;
            padding: 12px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

            width: 100%;
            padding: 10px;
            background: #f0f0f0;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .footer { text-align: center; color: white; padding: 30px; opacity: 0.9; }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            z-index: 2000;
            animation: fadeInUp 0.3s ease;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        
        .breadcrumb {
            background: rgba(255,255,255,0.2);
            padding: 12px 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            color: white;
        }

        @media (max-width: 768px) {

        let currentCategory = null;
        let currentSubcategory = null;
        
        function render() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            if (searchTerm) { searchProducts(searchTerm); return; }
            if (currentSubcategory) { renderProducts(); }
            else if (currentCategory) { renderSubcategories(); }
            else { renderCategories(); }
            renderBreadcrumb();
        }
        
        function renderCategories() {
            document.getElementById('categoriesNav').innerHTML = Object.keys(CATALOG).map(key => 
                `<button class="category-btn" onclick="selectCategory('${key}')">${CATALOG[key].icon} ${CATALOG[key].name}</button>`
            ).join('');
            document.getElementById('subcategoriesGrid').innerHTML = Object.keys(CATALOG).map(key => `
                <div class="subcategory-card" onclick="selectCategory('${key}')">
                    <div class="subcategory-icon">${CATALOG[key].icon}</div>
                    <div class="subcategory-name">${CATALOG[key].name}</div>
                    <div class="subcategory-count">${Object.keys(CATALOG[key].subcategories).length} подкатегорий</div>
                </div>
            `).join('');
            document.getElementById('productsGrid').innerHTML = '';
        }
        
        function selectCategory(key) { currentCategory = key; currentSubcategory = null; render(); }
        
        function renderSubcategories() {
            const cat = CATALOG[currentCategory];
            document.getElementById('categoriesNav').innerHTML = `
                <button class="category-btn" onclick="goBack()">← Назад</button>
                ${Object.keys(CATALOG).map(key => `<button class="category-btn" onclick="selectCategory('${key}')">${CATALOG[key].icon} ${CATALOG[key].name}</button>`).join('')}
            `;
            document.getElementById('subcategoriesGrid').innerHTML = Object.keys(cat.subcategories).map(key => `
                <div class="subcategory-card" onclick="selectSubcategory('${key}')">
                    <div class="subcategory-icon">${cat.subcategories[key].icon}</div>
                    <div class="subcategory-name">${cat.subcategories[key].name}</div>
                    <div class="subcategory-count">${cat.subcategories[key].products.length} товаров</div>
                    <div style="font-size:12px; color:#888;">${cat.subcategories[key].description}</div>
                </div>
            `).join('');
            document.getElementById('productsGrid').innerHTML = '';
        }
        
        function selectSubcategory(key) { currentSubcategory = key; render(); }
        
        function renderProducts() {
            const cat = CATALOG[currentCategory];
            const sub = cat.subcategories[currentSubcategory];
            document.getElementById('categoriesNav').innerHTML = `
                <button class="category-btn" onclick="goBackToSub()">← Назад</button>
                ${Object.keys(CATALOG).map(key => `<button class="category-btn" onclick="selectCategory('${key}')">${CATALOG[key].icon} ${CATALOG[key].name}</button>`).join('')}
            `;
            document.getElementById('subcategoriesGrid').innerHTML = '';
            document.getElementById('productsGrid').innerHTML = sub.products.map(p => {
                const stockClass = p.stock > 10 ? 'stock-high' : (p.stock > 0 ? 'stock-low' : 'stock-out');
                const stockText = p.stock > 10 ? `✅ В наличии (${p.stock} шт.)` : (p.stock > 0 ? `⚠️ Осталось ${p.stock} шт.` : '❌ Нет');
                return `
                    <div class="product-card">
                        <div class="product-image">${sub.icon}</div>
                        <div class="product-info">
                            <div class="product-name">${p.name}</div>
                            <div class="product-code">🔖 ${p.code}</div>
                            <div class="product-price">${p.price.toLocaleString()} ₽</div>
                            <div class="product-stock ${stockClass}">${stockText}</div>
                            <button class="order-btn" onclick='openOrderModal(${JSON.stringify(p).replace(/'/g, "&#39;")})' ${p.stock <= 0 ? 'disabled' : ''}>🛒 Заказать</button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function searchProducts(term) {
            const results = [];
            for (const [catKey, cat] of Object.entries(CATALOG)) {
                for (const [subKey, sub] of Object.entries(cat.subcategories)) {
                    for (const p of sub.products) {
                        if (p.name.toLowerCase().includes(term) || p.code.toLowerCase().includes(term) || String(p.price).includes(term)) {
                            results.push({...p, category: cat.name, subcategory: sub.name});
                        }
                    }
                }
            }
            document.getElementById('categoriesNav').innerHTML = `<button class="category-btn" onclick="clearSearch()">← Очистить поиск</button>`;
            document.getElementById('subcategoriesGrid').innerHTML = '';
            if (results.length === 0) {
                document.getElementById('productsGrid').innerHTML = '<div style="text-align:center; padding:60px; background:white; border-radius:20px;">😔 Товары не найдены</div>';
            } else {
                document.getElementById('productsGrid').innerHTML = results.map(p => `
                    <div class="product-card">
                        <div class="product-image">📦</div>
                        <div class="product-info">
                            <div class="product-name">${p.name}</div>
                            <div class="product-price">${p.price.toLocaleString()} ₽</div>
                            <div style="font-size:12px; color:#888;">${p.category} / ${p.subcategory}</div>
                            <button class="order-btn" onclick='openOrderModal(${JSON.stringify(p).replace(/'/g, "&#39;")})'>🛒 Заказать</button>
                        </div>
                    </div>
                `).join('');
            }
        }
        
        function clearSearch() { document.getElementById('searchInput').value = ''; currentCategory = null; currentSubcategory = null; render(); }
        function goBack() { currentCategory = null; currentSubcategory = null; render(); }
        function goBackToSub() { currentSubcategory = null; render(); }
        
        function renderBreadcrumb() {
            const bc = document.getElementById('breadcrumb');
            if (currentSubcategory && currentCategory) {
                bc.innerHTML = `🏠 <span onclick="clearSearch()">Главная</span> → <span onclick="selectCategory('${currentCategory}')">${CATALOG[currentCategory].name}</span> → ${CATALOG[currentCategory].subcategories[currentSubcategory].name}`;
            } else if (currentCategory) {
                bc.innerHTML = `🏠 <span onclick="clearSearch()">Главная</span> → ${CATALOG[currentCategory].name}`;
            } else { bc.innerHTML = `🏠 Главная`; }
        }
        
        let currentProductForOrder = null;
        function openOrderModal(p) {
            if (p.stock <= 0) { showToast('❌ Товара нет в наличии'); return; }
            currentProductForOrder = p;
            document.getElementById('selectedProductInfo').innerHTML = `<div style="font-weight:bold;">${p.name}</div><div>💰 ${p.price.toLocaleString()} ₽</div><div>📦 В наличии: ${p.stock} шт.</div>`;
            document.getElementById('orderProduct').value = `${p.name} (${p.code})`;
            document.getElementById('orderQty').value = 1;
            document.getElementById('orderQty').max = p.stock;
            document.getElementById('orderModal').style.display = 'flex';
        }
        
        function closeModal() { document.getElementById('orderModal').style.display = 'none'; }
        function showToast(msg) { const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }
        
        document.getElementById('orderForm').addEventListener('submit', function(e) { showToast('✉️ Заказ отправлен!'); setTimeout(() => closeModal(), 1500); });
        document.getElementById('searchInput').addEventListener('input', render);
        
        render();
    </script>
